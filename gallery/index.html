<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Zoe's Photography Studio</title>
    <style>
        /* 這裡是 CSS 區塊：專門管外觀 */
        body {
    background-color: #050505; /* 極致深黑 */
    margin: 0;
    display: flex;
    flex-direction: column; /* 讓內容由上而下排列 */
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
}

.photo-frame {
    max-width: 80%;
    max-height: 80vh;
    padding: 15px;
    background: white; /* 模擬照片相紙白邊 */
    box-shadow: 0 30px 60px rgba(0,0,0,0.9);
    transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
    cursor: pointer;
}

.photo-frame:hover {
    transform: scale(1.05) translateY(-10px); /* 向上浮起並放大 */
}

/* 加一個照片標題 */
.caption {
    color: #888;
    margin-top: 25px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 12px;
}
    </style>
</head>
<body>
<p class="caption">Sony A7C // Shot in Taipei</p>
    <img src="../images/pic10.jpg" class="photo-frame" alt="Sony A7C Work">

</body>
</html>
